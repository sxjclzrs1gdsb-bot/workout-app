const HISTORY_KEY = "glute_history_v2";
const REMINDER_KEY = "glute_reminder_v2";

function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)||"{}"); } catch { return {}; } }
function setHistory(h) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch {} }
function getReminder() { try { return JSON.parse(localStorage.getItem(REMINDER_KEY)||"null"); } catch { return null; } }
function setReminderStorage(r) { try { localStorage.setItem(REMINDER_KEY, JSON.stringify(r)); } catch {} }

// ── TIMER ─────────────────────────────────────────────────────────────────
function Timer({ duration, accent }) {
  const [secs, setSecs] = useState(duration);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const ref = useRef(null);

  useEffect(() => { setSecs(duration); setRunning(false); setDone(false); }, [duration]);

  useEffect(() => {
    if (running) {
      ref.current = setInterval(() => {
        setSecs(s => {
          if (s <= 1) { clearInterval(ref.current); setRunning(false); setDone(true); return 0; }
          return s - 1;
        });
      }, 1000);
    } else { clearInterval(ref.current); }
    return () => clearInterval(ref.current);
  }, [running]);

  const pct = secs / duration;
  const r = 34, circ = 2 * Math.PI * r;
  const m = Math.floor(secs / 60), s = secs % 60;

  return (
    <div style={{display:"flex",alignItems:"center",gap:"14px",background:"#111",borderRadius:"14px",padding:"12px 16px",marginBottom:"10px"}}>
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r={r} fill="none" stroke="#222" strokeWidth="5"/>
        <circle cx="40" cy="40" r={r} fill="none" stroke={done?"#4caf50":accent} strokeWidth="5"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          strokeLinecap="round" transform="rotate(-90 40 40)"
          style={{transition:"stroke-dashoffset 1s linear"}}/>
        <text x="40" y="46" textAnchor="middle" fill="white" fontSize="17" fontWeight="700" fontFamily="monospace">
          {String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}
        </text>
      </svg>
      <div style={{flex:1}}>
        <div style={{color:"#888",fontSize:"11px",marginBottom:"3px"}}>休息计时器 · {duration}秒</div>
        <div style={{color:done?"#4caf50":"white",fontWeight:"700",fontSize:"13px",marginBottom:"8px"}}>
          {done ? "✅ 休息完毕，可以继续了！" : running ? "计时中…" : "准备好了再开始"}
        </div>
        <div style={{display:"flex",gap:"6px"}}>
          <button onClick={() => { if(done){setSecs(duration);setDone(false);}else{setRunning(r=>!r); }}}
            style={{background:running?"#333":accent,color:"white",border:"none",borderRadius:"8px",padding:"7px 16px",fontSize:"12px",fontWeight:"700"}}>
            {running?"暂停":done?"再计一次":"开始"}
          </button>
          <button onClick={()=>{clearInterval(ref.current);setSecs(duration);setRunning(false);setDone(false);}}
            style={{background:"#222",color:"#888",border:"none",borderRadius:"8px",padding:"7px 12px",fontSize:"13px"}}>↺</button>
        </div>
      </div>
    </div>
  );
}

// ── HISTORY SCREEN ─────────────────────────────────────────────────────────
function HistoryScreen({ onBack }) {
  const history = getHistory();
  const entries = Object.entries(history).sort((a,b)=>b[0].localeCompare(a[0]));

  const streak = (() => {
    let s=0, d=new Date();
    for(let i=0;i<60;i++){
      const k=d.toISOString().slice(0,10);
      if(history[k]){s++; d.setDate(d.getDate()-1);}
      else if(i>0) break;
      else d.setDate(d.getDate()-1);
    }
    return s;
  })();

  const totalSessions = entries.length;
  const weekCounts = [0,0,0,0];
  entries.forEach(([,d])=>{ if(d.week>=0&&d.week<4) weekCounts[d.week]++; });

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",padding:"16px",fontFamily:"'Noto Sans SC',sans-serif"}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"}}>
        <button onClick={onBack} style={{background:"#1a1a1a",border:"none",color:"#aaa",borderRadius:"10px",padding:"8px 14px",fontSize:"13px"}}>← 返回</button>
        <div style={{fontSize:"18px",fontWeight:"800",color:"white"}}>训练记录</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
        {[["🗓","累计训练",`${totalSessions} 天`],["🔥","当前连续",`${streak} 天`]].map(([e,l,v])=>(
          <div key={l} style={{background:"#1a1a1a",borderRadius:"14px",padding:"16px",textAlign:"center"}}>
            <div style={{fontSize:"24px",marginBottom:"4px"}}>{e}</div>
            <div style={{fontSize:"10px",color:"#666",marginBottom:"4px"}}>{l}</div>
            <div style={{fontSize:"26px",fontWeight:"900",color:"white"}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{background:"#1a1a1a",borderRadius:"14px",padding:"14px",marginBottom:"16px"}}>
        <div style={{fontSize:"11px",color:"#666",marginBottom:"10px",fontWeight:"600"}}>各周完成次数</div>
        <div style={{display:"flex",gap:"8px"}}>
          {WEEKS.map((w,i)=>(
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:"16px",marginBottom:"4px"}}>{w.emoji}</div>
              <div style={{background:"#111",borderRadius:"6px",height:"40px",display:"flex",alignItems:"flex-end",overflow:"hidden",marginBottom:"4px"}}>
                <div style={{width:"100%",background:w.color,height:`${Math.min(100,(weekCounts[i]/4)*100)}%`,borderRadius:"6px",transition:"height 0.5s",minHeight:weekCounts[i]>0?"4px":0}}/>
              </div>
              <div style={{fontSize:"12px",color:"white",fontWeight:"700"}}>{weekCounts[i]}</div>
              <div style={{fontSize:"9px",color:"#555"}}>第{i+1}周</div>
            </div>
          ))}
        </div>
      </div>

      {entries.length===0 ? (
        <div style={{textAlign:"center",color:"#444",marginTop:"60px"}}>
          <div style={{fontSize:"48px",marginBottom:"12px"}}>📭</div>
          <div style={{fontSize:"14px"}}>还没有训练记录</div>
          <div style={{fontSize:"12px",marginTop:"6px",color:"#333"}}>完成第一次训练后会显示在这里</div>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
          {entries.map(([date,data])=>{
            const w = WEEKS[data.week];
            return (
              <div key={date} style={{background:"#1a1a1a",borderRadius:"12px",padding:"14px",display:"flex",alignItems:"center",gap:"12px"}}>
                <div style={{width:"40px",height:"40px",borderRadius:"10px",background:w?.color||"#333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>
                  {data.completed===data.total?"🏆":w?.emoji||"💪"}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"13px",fontWeight:"700",color:"white"}}>{date}</div>
                  <div style={{fontSize:"11px",color:"#666",marginTop:"2px"}}>
                    第{data.week+1}周 {w?.theme} · {data.sessionFocus} · {data.completed}/{data.total}个动作
                  </div>
                  <div style={{background:"#2a2a2a",borderRadius:"3px",height:"3px",marginTop:"6px"}}>
                    <div style={{background:w?.color||"#333",height:"3px",borderRadius:"3px",width:`${(data.completed/data.total)*100}%`}}/>

              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const [expanded, setExpanded] = useState(null);

  const [reminderBanner, setReminderBanner] = useState(false);

  const week = WEEKS[wk];
  const session = week.sessions[day];
  const accent = week.color;

  useEffect(() => {
    const r = getReminder();
    if (!r?.enabled) return;
    const now = new Date();
    const [h,m] = r.time.split(":").map(Number);
    const d = now.getDay();
    if (r.days.includes(d) && now.getHours()===h && Math.abs(now.getMinutes()-m)<=15) {
      setReminderBanner(true);
    }
  }, []);

  const toggleDone = (i) => {
    const key = `${wk}-${day}-${i}`;
    setDone(prev => {
      const next = {...prev, [key]: !prev[key]};
      const allDone = session.exercises.every((_,idx) => next[`${wk}-${day}-${idx}`]);
      if (allDone) {
        const today = new Date().toISOString().slice(0,10);

        h[today] = { week:wk, sessionFocus:session.focus, completed:session.exercises.length, total:session.exercises.length };

        setSessionDone(true);
      }
      return next;

                <div style={{flex:1}}>
                  <div style={{fontWeight:"700",fontSize:"14px",color:isDone?"#666":"white",textDecoration:isDone?"line-through":"none"}}>{ex.name}</div>
                  <div style={{fontSize:"11px",color:"#555",marginTop:"2px"}}>{ex.sets}组 · {ex.reps} · 休息{ex.rest}s · {ex.target}</div>
                </div>
                <div style={{fontSize:"13px",color:"#333"}}>{isExp?"▲":"▼"}</div>
              </div>

              {isExp && (
                <div className="fade-in" style={{padding:"0 14px 14px",borderTop:"1px solid #1f1f1f"}}>
                  {ex.rest > 0 && (
                    <div style={{marginTop:"12px",marginBottom:"12px"}}>
                      <button onClick={()=>setTimerKey(isTimer?null:key)}
                        style={{background:isTimer?"#222":"#111",border:`1px solid ${isTimer?accent:"#2a2a2a"}`,color:isTimer?accent:"#777",borderRadius:"8px",padding:"6px 14px",fontSize:"11px",fontWeight:"600"}}>
                        ⏱ {isTimer?"收起计时器":"开启休息计时器"}
                      </button>
                    </div>
                  )}
                  {isTimer && ex.rest > 0 && <Timer duration={ex.rest} accent={accent}/>}

                  <div style={{marginBottom:"10px"}}>
                    <div style={{fontSize:"11px",fontWeight:"700",color:accent,marginBottom:"6px",letterSpacing:"0.3px"}}>✅ 动作要点</div>
                    {ex.tips.map((t,j)=>(
                      <div key={j} style={{fontSize:"12px",color:"#bbb",padding:"4px 0",display:"flex",gap:"8px",lineHeight:"1.5"}}>
                        <span style={{color:accent,flexShrink:0}}>·</span>{t}
                      </div>
                    ))}
                  </div>
                  {ex.errors.length>0 && (
                    <div style={{marginBottom:"10px"}}>
                      <div style={{fontSize:"11px",fontWeight:"700",color:"#ef5350",marginBottom:"6px"}}>⚠️ 常见错误</div>
                      {ex.errors.map((e,j)=>(
                        <div key={j} style={{fontSize:"12px",color:"#bbb",padding:"4px 0",display:"flex",gap:"8px",lineHeight:"1.5"}}>
                          <span style={{color:"#ef5350",flexShrink:0}}>·</span>{e}
                        </div>
                      ))}
                    </div>
                  )}
                  <button onClick={()=>toggleDone(i)}
                    style={{width:"100%",padding:"11px",background:isDone?"#222":accent,color:isDone?"#666":"white",border:"none",borderRadius:"9px",fontSize:"13px",fontWeight:"700",transition:"all 0.2s"}}>
                    {isDone?"取消完成":"完成这个动作 ✓"}
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{marginTop:"16px",background:"#1a1a1a",borderRadius:"12px",padding:"12px 14px",fontSize:"11px",color:"#444",lineHeight:"1.9"}}>
        <div style={{color:"#666",fontWeight:"700",marginBottom:"4px"}}>💡 今日提示</div>
        <div>• 点圆圈数字可直接标记完成，点标题展开详情</div>
        <div>• 关节痛立刻停，肌肉酸痛是正常反应</div>
        <div>• 全部打勾后自动保存到训练记录 📊</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
